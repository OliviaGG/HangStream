name: hangstream
services:
  - name: web
    git:
      repo_clone_url: https://github.com/<your-username>/hangstream
      branch: main
      dir: /
    run_command: npm start
    envs:
      - key: GOOGLE_CLIENT_ID
        value: YOUR_GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
        value: YOUR_GOOGLE_CLIENT_SECRET
      - key: GOOGLE_OWNER_REDIRECT_URI
        value: https://<your-app>.ondigitalocean.app/oauth/google/callback
      - key: GOOGLE_VIEWER_REDIRECT_URI
        value: https://<your-app>.ondigitalocean.app/auth/google/callback
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    enable_https_redirect: true
    enable_websockets: true
