<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HangStream</title>
<!-- external stylesheet removed; inline fallback provided below -->
<style id="inline-shared">
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0e0e12;
    --bg-elevated: #0b0b0f;
    --panel: #1a1a22;
    --panel-strong: #20202a;
    --text: #f0ede8;
    --text-muted: #888;
    --muted: #666;
    --border: #2a2a35;
    --accent: #ff4d6d;
    --accent-hover: #ff6b85;
    --good: #2ecc71;
    --bad: #ff7a7a;
    --secondary: #3a3a45;
    color-scheme: dark;
  }

  body[data-theme="light"] {
    --bg: #f5f0ea;
    --bg-elevated: #efe8e1;
    --panel: #ffffff;
    --panel-strong: #f8f2ec;
    --text: #1f1f28;
    --text-muted: #5c5c68;
    --muted: #6f6f7c;
    --border: #d7cfc6;
    --accent: #c93f5c;
    --accent-hover: #e15a76;
    --good: #1f8f53;
    --bad: #c74444;
    --secondary: #7b7681;
    color-scheme: light;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(255, 77, 109, 0.10), transparent 28%),
      radial-gradient(circle at top right, rgba(124, 92, 255, 0.10), transparent 24%),
      linear-gradient(180deg, color-mix(in srgb, var(--bg) 90%, #000 10%), var(--bg));
    color: var(--text);
    font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    overflow: hidden;
  }

  .game-wrap {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    gap: 16px;
    padding: 20px;
  }

  .topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border: 1px solid var(--border);
    border-radius: 24px;
    background: color-mix(in srgb, var(--bg-elevated) 88%, transparent);
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.14);
  }

  .logo {
    font-family: Inter, system-ui, sans-serif;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: 0.16em;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .lives-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .life-dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: var(--accent);
    transition: all 0.3s;
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
  }

  .life-dot.lost { background: var(--border); }

  .category-badge {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--panel) 80%, transparent);
  }

  .game-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 34px;
    gap: 32px;
    border: 1px solid var(--border);
    border-radius: 28px;
    background: color-mix(in srgb, var(--bg-elevated) 88%, transparent);
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.14);
    min-width: 0;
  }

  .hangman-container {
    width: 200px;
    height: 180px;
  }

  .hm-part {
    transition: opacity 0.3s;
    opacity: 0;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
  }

  .hm-part.show { opacity: 1; }

  .hm-gallows {
    stroke: var(--secondary);
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
  }

  .word-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .letter-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .letter-char {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent);
    min-width: 26px;
    text-align: center;
    transition: all 0.2s;
  }

  .letter-line {
    width: 26px;
    height: 2px;
    background: var(--secondary);
  }

  .keyboard {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 480px;
  }

  .kb-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .kb-key {
    width: 38px;
    height: 40px;
    background: color-mix(in srgb, var(--panel) 90%, transparent);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .kb-key:hover:not(:disabled) {
    background: var(--panel-strong);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }

  .kb-key:disabled { opacity: 0.2; cursor: default; }

  .kb-key.correct {
    background: color-mix(in srgb, var(--good) 18%, transparent);
    border-color: var(--good);
    color: var(--good);
  }

  .kb-key.wrong {
    background: var(--panel);
    border-color: var(--border);
    color: var(--border);
    opacity: 0.3;
  }

  .sidebar {
    border: 1px solid var(--border);
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    background: color-mix(in srgb, var(--bg-elevated) 90%, transparent);
    backdrop-filter: blur(14px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.14);
    min-width: 0;
    overflow: hidden;
  }

  .sidebar-head {
    padding: 18px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 2.2px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .twitch-status {
    opacity: 0.72;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* Micro-interactions and accessibility */
  .kb-key { transition: transform 110ms ease, box-shadow 110ms ease, background-color 120ms ease; }
  .kb-key:active { transform: translateY(2px) scale(0.995); }
  .kb-key:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 18%, transparent); outline-offset: 2px; border-radius: 10px; }

  .chat-feed, .preview-box { scroll-behavior: smooth; }

  .chat-msg { transition: transform 180ms ease, opacity 180ms ease; }

  .chat-feed {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: calc(100vh - 60px);
  }

  .chat-msg {
    font-size: 13px;
    line-height: 1.5;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-user { color: var(--accent); font-weight: 700; }
  .chat-guess { color: color-mix(in srgb, var(--text) 94%, transparent); }
  .chat-system { color: var(--muted); font-style: italic; }
  .chat-correct { color: var(--good); }
  .chat-wrong { color: var(--bad); }
  .chat-avatar { display:inline-block; width:20px; text-align:center; margin-right:6px; }
  .player-score-avatar { display:inline-block; width:20px; text-align:center; margin-right:6px; }

  .overlay {
    position: fixed;
    inset: 0;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show { opacity: 1; pointer-events: all; }

  .revival-box {
    background: color-mix(in srgb, var(--panel) 92%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 55%, var(--border));
    border-radius: 28px;
    padding: 34px 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.20);
    backdrop-filter: blur(16px);
  }

  .overlay-title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .overlay-tag {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: color-mix(in srgb, var(--panel) 84%, transparent);
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .revival-title {
    font-family: Inter, system-ui, sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .revival-sub {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    margin-bottom: 28px;
  }

  .gift-prompt {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .gift-amount {
    font-family: Inter, system-ui, sans-serif;
    font-size: 44px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .gift-type {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 28px;
    letter-spacing: 0.14em;
  }

  .countdown-ring {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
  }

  .countdown-ring svg { transform: rotate(-90deg); }

  .countdown-circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 4;
    stroke-dasharray: 226;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
    stroke-linecap: round;
  }

  .countdown-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }

  .countdown-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text);
  }

  .btn-revive {
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    border: none;
    padding: 12px 36px;
    border-radius: 14px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    width: 100%;
    margin-bottom: 10px;
  }

  .btn-revive:hover { background: var(--accent-hover); }

  .btn-skip {
    background: color-mix(in srgb, var(--panel) 70%, transparent);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 36px;
    border-radius: 14px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    width: 100%;
  }

  .btn-skip:hover { color: var(--text-muted); border-color: var(--secondary); }

  .win-box .revival-title { color: var(--good); }
  .win-box { border-color: var(--good); }

  .new-game-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    border: none;
    padding: 12px 36px;
    border-radius: 14px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
    margin-top: 8px;
  }

  .new-game-btn:hover { background: var(--accent-hover); }

  .game-area { position: relative; flex: 1; }

  .settings-btn {
    background: color-mix(in srgb, var(--panel) 80%, transparent);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 14px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }

  .settings-btn:hover { color: var(--text); border-color: var(--secondary); }

  .theme-btn {
    background: color-mix(in srgb, var(--panel) 80%, transparent);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 14px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    min-width: 104px;
  }

  .theme-btn:hover { color: var(--text); border-color: var(--secondary); }

  .player-scores {
    margin: 12px;
    border: 1px solid var(--border);
    border-radius: 18px;
    background: var(--bg-elevated);
    overflow: hidden;
  }

  .player-scores-head {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .player-scores-list {
    display: flex;
    flex-direction: column;
    max-height: 180px;
    overflow: auto;
  }

  .player-score-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }

  .player-score-row:first-child { border-top: 0; }
  .player-score-name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player-score-points { color: var(--accent); font-weight: 700; }
  .player-score-note { color: var(--text-muted); font-size: 11px; }

  .settings-overlay {
    position: fixed;
    inset: 0;
    background: color-mix(in srgb, var(--bg) 94%, transparent);
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .settings-overlay.show { opacity: 1; pointer-events: all; }

  .settings-box {
    background: color-mix(in srgb, var(--panel) 96%, transparent);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 34px;
    width: 520px;
    max-width: 90vw;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
    backdrop-filter: blur(16px);
  }

  .settings-title {
    font-family: Inter, system-ui, sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .setting-row { margin-bottom: 20px; }

  .setting-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .setting-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: Inter, system-ui, sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
  }

  .setting-input:focus { border-color: var(--accent); }

  .settings-actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }

  .btn-save {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 12px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    flex: 1;
  }

  .btn-save:hover { background: var(--accent-hover); }

  .btn-google {
    background: linear-gradient(90deg,#4285F4,#34A853);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
  }

  .btn-google:hover { opacity: 0.95; }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 28px;
    border-radius: 12px;
    font-family: Inter, system-ui, sans-serif;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
  }

  .btn-cancel:hover { color: var(--text-muted); }

  .viewer-login-title {
    font-family: Inter, system-ui, sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .viewer-login-note {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .twitch-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
  }

  .twitch-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
  }

  .twitch-dot.connected { background: #9146ff; }

  @media (max-width: 640px) {
    body { overflow: auto; }
    .game-wrap { grid-template-columns: 1fr; grid-template-rows: auto auto auto; padding: 12px; gap: 12px; }
    .sidebar { border-left: 0; min-height: 260px; }
    .game-main { padding: 24px 18px; gap: 24px; }
    .topbar { flex-wrap: wrap; gap: 10px; }
  }
</style>
</head>
<body>

<div class="game-wrap">
 
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">HANG<span>STREAM</span></div>
    <div class="lives-row" id="lives-row"></div>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="category-badge" id="category-badge">Loading...</div>
      <select id="difficulty-select" class="setting-input" style="width:110px;">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
      <button class="settings-btn" onclick="startGoogleAuth()" id="viewer-login-btn">Sign in with Google</button>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">Dark mode</button>
      <button class="settings-btn" onclick="window.open('/streamer', '_blank', 'noopener')">⚙ Streamer Settings</button>
    </div>
  </div>
 
  <!-- MAIN GAME AREA -->
  <div class="game-area">
 
    <!-- REVIVAL / WIN OVERLAY -->
    <div class="overlay" id="overlay">
      <div class="revival-box" id="overlay-box">
        <div class="revival-title" id="overlay-title">GAME OVER</div>
        <div class="revival-sub" id="overlay-sub">The word was <span id="reveal-word" style="color:#ff4d6d"></span></div>
 
        <div id="revival-section">
          <div class="gift-prompt" id="gift-prompt-text">Send a gift to revive!</div>
          <div class="gift-amount" id="gift-amount">5</div>
          <div class="gift-type" id="gift-type">ROSES</div>
 
          <div class="countdown-ring">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle class="countdown-bg" cx="40" cy="40" r="36"/>
              <circle class="countdown-circle" id="countdown-circle" cx="40" cy="40" r="36"/>
            </svg>
            <div class="countdown-num" id="countdown-num">15</div>
          </div>

          <button class="btn-revive" onclick="revive()">🎁 REVIVE THE TEAM</button>
          <button class="btn-skip" onclick="newGame()">Skip revival → new word</button>
        </div>

        <div id="win-section" style="display:none">
          <div style="font-size:13px; color:#aaa; margin-bottom:20px">Chat carried! 🎉</div>
          <button class="new-game-btn" onclick="newGame()">Play again</button>
        </div>
      </div>
    </div>

    <div class="game-main">
      <svg class="hangman-container" viewBox="0 0 200 180">
        <line class="hm-gallows" x1="20" y1="170" x2="100" y2="170"/>
        <line class="hm-gallows" x1="40" y1="170" x2="40" y2="20"/>
        <line class="hm-gallows" x1="40" y1="20" x2="120" y2="20"/>
        <line class="hm-gallows" x1="120" y1="20" x2="120" y2="40"/>
        <circle id="hm-head" class="hm-part" cx="120" cy="52" r="12"/>
        <line   id="hm-body" class="hm-part" x1="120" y1="64" x2="120" y2="110"/>
        <line   id="hm-la"   class="hm-part" x1="120" y1="75" x2="96" y2="95"/>
        <line   id="hm-ra"   class="hm-part" x1="120" y1="75" x2="144" y2="95"/>
        <line   id="hm-ll"   class="hm-part" x1="120" y1="110" x2="96" y2="140"/>
        <line   id="hm-rl"   class="hm-part" x1="120" y1="110" x2="144" y2="140"/>
      </svg>

      <div class="word-row" id="word-row"></div>
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>
 
  <!-- CHAT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="live-dot"></div>
      Chat feed
      <span style="margin-left:auto;" class="twitch-status">
        <span class="twitch-dot" id="twitch-dot"></span>
        <span id="twitch-label">DEMO MODE</span>
      </span>
    </div>
    <div class="player-scores">
      <div class="player-scores-head">
        <span>Player Scores</span>
        <span id="player-score-status">Per letter</span>
      </div>
      <div class="player-scores-list" id="player-scores-list">
        <div class="player-score-row"><span class="player-score-name">No points yet.</span><span class="player-score-points">0</span></div>
      </div>
    </div>
    <div class="chat-feed" id="chat-feed"></div>
  </div>
</div>

<div class="settings-overlay" id="viewer-login-overlay">
  <div class="settings-box">
    <div class="viewer-login-title">Sign in to participate</div>
    <div class="viewer-login-note">Please sign in with Google to join the game and have your profile saved.</div>
    <div class="settings-actions" style="justify-content:center; margin-top:16px;">
      <button class="btn-google" onclick="startGoogleAuth()">Sign in with Google</button>
      <button class="btn-cancel" onclick="closeViewerLogin()">Close</button>
    </div>
  </div>
</div>
 
<script>
// storage/focus listeners moved here from inside the CSS block
window.addEventListener('storage', (event) => {
  if (event.key === getSettingsStorageKey()) {
    loadSavedSettings();
  }
  if (event.key === getThemeStorageKey()) {
    applyTheme(event.newValue || 'dark');
  }
});

window.addEventListener('focus', () => {
  loadSavedSettings();
});

// ── DEFAULT CONFIG ──
let config = {
  giftType: 'ROSES',
  giftAmount: 5,
  revivalSecs: 15,
  prefix: '!',
  twitchChannel: '',
  customWords: [],
  difficulty: 'medium',
};
 
const DEFAULT_WORDS = [
  { word: "JAVASCRIPT", cat: "Programming" },
  { word: "STREAMER", cat: "Gaming" },
  { word: "ALGORITHM", cat: "Tech" },
  { word: "TWITCH", cat: "Streaming" },
  { word: "DONATION", cat: "Streaming" },
  { word: "KEYBOARD", cat: "Hardware" },
  { word: "FOLLOWER", cat: "Social Media" },
  { word: "SUBSCRIBE", cat: "Social Media" },
  { word: "MINECRAFT", cat: "Games" },
  { word: "CONTROLLER", cat: "Gaming" },
  { word: "HIGHLIGHT", cat: "Streaming" },
  { word: "PIXEL", cat: "Design" },
  { word: "BROADCAST", cat: "Streaming" },
  { word: "DUNGEON", cat: "Games" },
  { word: "CHAMPION", cat: "Games" },
  { word: "LATENCY", cat: "Tech" },
  { word: "OVERLAY", cat: "Streaming" },
  { word: "EMOTE", cat: "Streaming" },
  { word: "MODERATION", cat: "Streaming" },
  { word: "BANDWIDTH", cat: "Tech" },
];
 
const FAKE_USERS = ["xX_gamer99_Xx","streamer_fan","tiktok_live","chat_legend","just_vibing","pro_viewer","randomdude42","hyped_up_lol","lurker_no_more","gifted_sub","nochill_andy","pogchamp99"];
 
const MAX_WRONG = 6;
 
let state = {};
let countdownInterval = null;
let chatInterval = null;
let twitchWS = null;
let viewerWS = null;
let autoAdvanceTimer = null;
let lastWordKey = null;
let currentTheme = 'dark';
let playerScores = {};
let lastSolverName = '';
const VIEWER_PROFILE_KEY = 'hangstream-viewer-profile';
const PROFILES_STORAGE_KEY = 'hangstream-profiles';
const LETTER_SCORE = 1;
const SOLVE_BONUS = 10;

function getCookieValue(name) {
  const escaped = String(name || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const match = String(document.cookie || '').match(new RegExp('(?:^|; )' + escaped + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : '';
}

function getRouteNamespace() {
  const pathName = String(location.pathname || '/').replace(/\/+$/, '');
  if (!pathName || pathName === '/' || pathName === '/viewer' || pathName === '/streamer') return '';
  if (/^\/(oauth|auth|terms|privacy|scores|score|music)(\/|$)/.test(pathName)) return '';
  if (pathName.indexOf('/', 1) !== -1) return '';
  const slug = pathName.slice(1).trim().toLowerCase();
  return /^[a-z0-9_.@-]+$/.test(slug) ? slug : '';
}

function getStreamerNamespace() {
  try {
    const routeNamespace = getRouteNamespace();
    if (routeNamespace) return routeNamespace;
  } catch (e) {}
  try {
    const customId = localStorage.getItem('hangstream-streamer-user-id') || '';
    if (customId) return customId;
  } catch (e) {}
  try {
    const cookieOwner = getCookieValue('owner');
    if (cookieOwner) return cookieOwner;
  } catch (e) {}
  try {
    const storedOwner = localStorage.getItem('hangstream-streamer-id') || '';
    if (storedOwner) return storedOwner;
  } catch (e) {}
  return 'default';
}

function getSettingsStorageKey() {
  return `hangstream-settings:${getStreamerNamespace()}`;
}

function getThemeStorageKey() {
  return `hangstream-game-theme:${getStreamerNamespace()}`;
}

function loadSavedSettings() {
  try {
    const raw = localStorage.getItem(getSettingsStorageKey());
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && typeof saved === 'object') {
        config = { ...config, ...saved };
      }
    }
  } catch (e) {
    // Ignore malformed settings blobs.
  }

  const difficultySelect = document.getElementById('difficulty-select');
  if (difficultySelect) difficultySelect.value = config.difficulty || 'medium';
  if (state && typeof state === 'object') state.streamerId = getStreamerNamespace();
}

function saveSettings() {
  try {
    localStorage.setItem(getSettingsStorageKey(), JSON.stringify(config));
  } catch (e) {}
}

function applyTheme(theme) {
  const nextTheme = theme === 'light' ? 'light' : 'dark';
  currentTheme = nextTheme;
  document.body.setAttribute('data-theme', nextTheme);
  const themeBtn = document.getElementById('theme-btn');
  if (themeBtn) themeBtn.textContent = nextTheme === 'light' ? 'Light mode' : 'Dark mode';
  try {
    localStorage.setItem(getThemeStorageKey(), nextTheme);
  } catch (e) {}
}

function toggleTheme() {
  applyTheme(currentTheme === 'light' ? 'dark' : 'light');
}

const difficultySelect = document.getElementById('difficulty-select');
if (difficultySelect) {
  difficultySelect.addEventListener('change', (event) => {
    config.difficulty = event.target.value || 'medium';
    saveSettings();
  });
}

loadSavedSettings();
applyTheme(localStorage.getItem(getThemeStorageKey()) || 'dark');

function makeViewerId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
  return `viewer-${Math.random().toString(36).slice(2)}-${Date.now().toString(36)}`;
}

function normalizeViewerProfile(raw) {
  if (!raw || typeof raw !== 'object') return null;
  const id = typeof raw.id === 'string' && raw.id.trim() ? raw.id.trim() : makeViewerId();
  const name = typeof raw.name === 'string' ? raw.name.trim() : '';
  return { id, name };
}

function loadViewerProfile() {
  try {
    const saved = JSON.parse(localStorage.getItem(VIEWER_PROFILE_KEY) || 'null');
    const profile = normalizeViewerProfile(saved);
    if (profile) return profile;
  } catch {
    // Ignore malformed profile data.
  }
  return { id: makeViewerId(), name: '' };
}

function getPlayerName(username) {
  const name = String(username || '').trim();
  return name || 'viewer';
}

function awardPlayerPoints(username, points, note) {
  const name = getPlayerName(username);
  const current = Number(playerScores[name]) || 0;
  playerScores[name] = current + Math.max(0, Number(points) || 0);
  if (note) lastSolverName = note;
  renderPlayerScores();
  // attempt to persist this award to server for authenticated viewers
  try {
    fetch('/score', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ points: Number(points) || 0, reason: note || '' }) }).catch(()=>{});
  } catch (e) {}
}

function renderPlayerScores() {
  const list = document.getElementById('player-scores-list');
  const status = document.getElementById('player-score-status');
  if (!list) return;
  const entries = Object.entries(playerScores)
    .filter(([, points]) => Number(points) > 0)
    .sort((a, b) => Number(b[1]) - Number(a[1]) || a[0].localeCompare(b[0]));
  if (!entries.length) {
    list.innerHTML = '<div class="player-score-row"><span class="player-score-name">No points yet.</span><span class="player-score-points">0</span></div>';
    if (status) status.textContent = 'Per letter';
    return;
  }
  if (status) status.textContent = lastSolverName ? `Solved by ${lastSolverName}` : 'Per letter';
  list.innerHTML = entries.map(([name, points]) => {
    const prof = getProfileByName(name) || {};
    const avatar = prof.avatar ? `<span class="player-score-avatar">${escapeHtml(prof.avatar)}</span>` : '';
    const display = prof.name ? escapeHtml(prof.name) : escapeHtml(name);
    return `<div class="player-score-row"><span class="player-score-name">${avatar}<span style="margin-left:8px">${display}</span></span><span class="player-score-points">${points}</span></div>`;
  }).join('');
}

async function refreshScoresFromServer() {
  try {
    const res = await fetch('/scores', { credentials: 'same-origin' });
    if (!res || res.status !== 200) return;
    const data = await res.json();
    // merge server totals into local playerScores by matching viewer profiles when possible
    Object.keys(data || {}).forEach(id => {
      const entry = data[id];
      if (!entry) return;
      const prof = Object.values(loadProfiles()).find(p => p && p.id === id);
      const name = prof && prof.name ? prof.name : id;
      playerScores[name] = Number(entry.total || 0);
    });
    renderPlayerScores();
  } catch (e) { /* ignore */ }
}

// refresh scores on startup and periodically
setTimeout(refreshScoresFromServer, 1000);
setInterval(refreshScoresFromServer, 30 * 1000);

function escapeHtml(value) {
  return String(value).replace(/[&<>\"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function saveViewerProfile(profile) {
  try {
    localStorage.setItem(VIEWER_PROFILE_KEY, JSON.stringify(profile));
  } catch {
    // Ignore storage failures.
  }
}

function renderViewerProfile() {
  const loginBtn = document.getElementById('viewer-login-btn');
  if (loginBtn) {
    loginBtn.textContent = state.viewerName ? `Signed in: ${state.viewerName}` : 'Sign in with Google';
  }
}

function openViewerLogin() {
  // Deprecated: replaced by Google-only sign-in flow.
  startGoogleAuth();
}

function closeViewerLogin() {
  const overlay = document.getElementById('viewer-login-overlay');
  if (overlay) overlay.classList.remove('show');
}

async function saveViewerLogin() {
  const input = document.getElementById('viewer-name-input');
  const name = (input && input.value ? input.value : '').trim();
  if (!name) return;
  const aIn = document.getElementById('viewer-avatar-input');
  const avatar = (aIn && aIn.value) ? String(aIn.value).trim() : '';
  // always save to local profiles map under the new name
  setProfileForName(name, { name, avatar });

  // if we're editing the current viewer (or no explicit target), update state and persist server-side
  if (!profileEditingTarget || profileEditingTarget === state.viewerName) {
    state.viewerName = name;
    state.viewerAvatar = avatar;
    if (!state.viewerId) state.viewerId = makeViewerId();
    saveViewerProfile({ id: state.viewerId, name: state.viewerName });
    // persist to server if possible
    try {
      fetch('/viewer/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: state.viewerId, name: state.viewerName, avatar: avatar, provider: 'manual' }) }).catch(()=>{});
    } catch (e) {}
    renderViewerProfile();
  }

  // clear editing target and close overlay
  profileEditingTarget = null;
  renderPlayerScores();
  closeViewerLogin();
}

function startGoogleAuth() {
  try {
    const w = window.open('/auth/google', 'hs_google_oauth', 'width=600,height=700');
    if (!w) {
      alert('Popup blocked. Allow popups for this site to sign in.');
      return;
    }
    w.focus();
  } catch (e) {
    console.error('Failed to open Google auth popup', e);
  }
}

// Listen for OAuth result from popup (viewer login flow)
window.addEventListener('message', (ev) => {
  try {
    if (!ev || ev.origin !== location.origin) return;
    const data = ev.data || {};
    if (data && data.type === 'viewer-login') {
      const id = data.id || '';
      const name = data.name || '';
      if (id && name) {
        state.viewerId = id;
        state.viewerName = name;
        saveViewerProfile({ id: state.viewerId, name: state.viewerName });
        // save profile locally and attempt to persist on server
        const avatar = state.viewerAvatar || (document.getElementById('viewer-avatar-input') && document.getElementById('viewer-avatar-input').value) || '';
        setProfileForName(state.viewerName, { name: state.viewerName, avatar: avatar });
        try {
          fetch('/viewer/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: state.viewerId, name: state.viewerName, avatar: avatar, provider: data.provider || 'google' }) }).catch(()=>{});
        } catch (e) {}
        renderViewerProfile();
        closeViewerLogin();
      }
    }
  } catch (e) { /* ignore */ }
});

// --- Profiles (local, keyed by display name) ---
function loadProfiles() {
  try {
    return JSON.parse(localStorage.getItem(PROFILES_STORAGE_KEY) || '{}') || {};
  } catch (e) { return {}; }
}

function saveProfiles(profiles) {
  try { localStorage.setItem(PROFILES_STORAGE_KEY, JSON.stringify(profiles || {})); } catch (e) {}
}

function getProfileByName(name) {
  if (!name) return null;
  try {
    const profiles = loadProfiles();
    const n = String(name || '').trim();
    if (n && profiles[n]) return profiles[n];
  } catch (e) {}
  // fallback: if this viewer matches current state, return viewer profile
  if (state && state.viewerName && String(state.viewerName).trim() === String(name).trim()) {
    return { name: state.viewerName, avatar: state.viewerAvatar || '' };
  }
  return null;
}

function setProfileForName(name, profile) {
  if (!name || !profile) return;
  const profiles = loadProfiles();
  profiles[String(name).trim()] = { name: String(profile.name || name).trim(), avatar: String(profile.avatar || '').trim() };
  saveProfiles(profiles);
}

function renderPlayerScores() {
  const list = document.getElementById('player-scores-list');
  const status = document.getElementById('player-score-status');
  if (!list) return;
  const entries = Object.entries(playerScores)
    .filter(([, points]) => Number(points) > 0)
    .sort((a, b) => Number(b[1]) - Number(a[1]) || a[0].localeCompare(b[0]));
  if (!entries.length) {
    list.innerHTML = '<div class="player-score-row"><span class="player-score-name">No points yet.</span><span class="player-score-points">0</span></div>';
    if (status) status.textContent = 'Per letter';
    return;
  }
  if (status) status.textContent = lastSolverName ? `Solved by ${lastSolverName}` : 'Per letter';
  list.innerHTML = entries.map(([name, points]) => {
    const prof = getProfileByName(name) || {};
    const avatar = prof.avatar ? `<span class="player-score-avatar">${escapeHtml(prof.avatar)}</span>` : '';
    const display = prof.name ? escapeHtml(prof.name) : escapeHtml(name);
    return `<div class="player-score-row"><span class="player-score-name">${avatar}<span style="margin-left:8px">${display}</span></span><span class="player-score-points">${points}</span></div>`;
  }).join('');
}

// (rest of script unchanged — the public copy mirrors original index.html)
</script>
