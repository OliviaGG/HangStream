<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PPSHEVKZK8"></script>
  <script>

    gtag('config', 'G-PPSHEVKZK8');

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaderboard - HangStream</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e12;
      --bg-elevated: #0b0b0f;
      --bg-alt: #0b0b0f;
      --card: #1a1a22;
      --card-border: #2a2a35;
      --panel: #1a1a22;
      --panel-border: #2a2a35;
      --text: #f0ede8;
      --text-muted: #92a0af;
      --muted: #92a0af;
      --accent: #ff4d6d;
      --accent-2: #7c5cff;
      --accent-3: #7c5cff;
      --good: #25c27a;
      --warning: #ffbe55;
      --bad: #ff4d4d;
      --glass: rgba(255,255,255,0.05);
      --radius: 24px;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --bg-elevated: #ffffff;
      --bg-alt: #ffffff;
      --card: #ffffff;
      --card-border: #e2e8f0;
      --panel: #ffffff;
      --panel-border: #e2e8f0;
      --text: #0f1724;
      --text-muted: #64748b;
      --muted: #64748b;
      --glass: rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 77, 109, 0.15), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 92, 255, 0.12), transparent 24%),
        radial-gradient(circle at bottom left, rgba(37, 194, 122, 0.08), transparent 20%),
        linear-gradient(180deg, color-mix(in srgb, var(--bg) 95%, #000), var(--bg));
    }

    [data-theme="light"] body {
      background:
        radial-gradient(circle at top left, rgba(255, 77, 109, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 92, 255, 0.06), transparent 24%),
        radial-gradient(circle at bottom left, rgba(37, 194, 122, 0.04), transparent 20%),
        linear-gradient(180deg, #f8fafc, #ffffff);
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .back-link:hover { color: var(--text); }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--accent);
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 32px;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .leaderboard-item {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.2s;
    }

    .leaderboard-item:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 77, 109, 0.2);
    }

    .rank {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .rank.gold { background: linear-gradient(135deg, #ffd700, #ffb900); color: #000; }
    .rank.silver { background: linear-gradient(135deg, #c0c0c0, #a8a8a8); color: #000; }
    .rank.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
    .rank.default { background: rgba(255, 255, 255, 0.1); color: var(--muted); }

    .player-info {
      flex: 1;
      min-width: 0;
    }

    .player-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .player-details {
      color: var(--muted);
      font-size: 14px;
    }

    .player-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--accent);
      font-weight: 800;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state h3 {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .page { padding: 20px 16px 40px; }
      .panel { padding: 24px; }
      .leaderboard-item { padding: 16px; gap: 16px; }
      .rank { width: 40px; height: 40px; font-size: 20px; }
      .player-score { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div style="display:flex;gap:20px;align-items:center;">
        <a href="/" class="logo">HANG<span>STREAM</span></a>
        <a href="/viewer" class="back-link">← Back to Game</a>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        <div class="page-title">Leaderboard</div>
      </div>
      <div></div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="global">🌍 Global</div>
      <div class="tab" data-tab="room">🎮 Streamer Leaderboard</div>
    </div>

    <div id="streamer-selector" style="display:none;margin-bottom:20px;">
      <label style="color:var(--text-muted);font-size:14px;margin-bottom:8px;display:block;">Select Streamer:</label>
      <select id="streamer-dropdown" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--panel-border);background:var(--bg-elevated);color:var(--text);font-size:16px;cursor:pointer;">
        <option value="">-- Choose a streamer --</option>
      </select>
    </div>

    <div class="panel">
      <div id="leaderboard-content">
        <div class="loading">Loading leaderboard...</div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'global';
    let scoresData = null;

    function getStreamerNamespace() {
      const pathName = String(location.pathname || '/').replace(/\/+$/, '');
      if (!pathName || pathName === '/' || pathName === '/viewer' || pathName === '/leaderboard') return '';
      if (/^\/(oauth|auth|terms|privacy|scores|score|music|profile)(\/|$)/.test(pathName)) return '';
      if (pathName.indexOf('/', 1) !== -1) return '';
      const slug = pathName.slice(1).trim().toLowerCase();
      return /^[a-z0-9_.@-]+$/.test(slug) ? slug : '';
    }

    async function loadScores() {
      try {
        const res = await fetch('/scores', { credentials: 'same-origin' });
        if (!res || res.status !== 200) {
          showError('Failed to load scores');
          return;
        }

        scoresData = await res.json();
        renderLeaderboard(currentTab);
      } catch (e) {
        console.error('Failed to load scores', e);
        showError('Failed to load leaderboard');
      }
    }

    function renderLeaderboard(tab) {
      const container = document.getElementById('leaderboard-content');

      if (!scoresData) {
        container.innerHTML = '<div class="loading">Loading leaderboard...</div>';
        return;
      }

      let scores = tab === 'global' ? scoresData.globalScores : scoresData.roomScores;
      renderScores(scores, tab);
    }

    function renderScores(scores, tab) {
      const container = document.getElementById('leaderboard-content');

      // Convert to array and sort by score
      const sortedScores = Object.entries(scores || {})
        .map(([id, data]) => ({ id, ...data }))
        .sort((a, b) => (b.total || 0) - (a.total || 0));

      if (sortedScores.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No scores yet</h3>
            <p>${tab === 'global' ? 'Be the first to score globally!' : 'No scores in this room yet.'}</p>
          </div>
        `;
        return;
      }

      // Show all scores with scrollbar
      const allScores = sortedScores;
      const profileCache = {};

      async function loadProfileName(id) {
        if (profileCache[id]) return profileCache[id];

        try {
          const res = await fetch(`/viewer/profile?id=${encodeURIComponent(id)}`);
          if (res && res.status === 200) {
            const profile = await res.json();
            profileCache[id] = profile.name || 'Anonymous';
            return profileCache[id];
          }
        } catch (e) {}
        profileCache[id] = id;
        return id;
      }

      container.innerHTML = '<div class="loading">Loading players...</div>';

      // Load profile names for all players
      const namePromises = allScores.map(item => loadProfileName(item.id));
      Promise.all(namePromises).then(names => {
        container.innerHTML = `
          <div class="leaderboard-list">
            ${allScores.map((item, index) => {
              const rank = index + 1;
              let rankClass = 'default';
              if (rank === 1) rankClass = 'gold';
              else if (rank === 2) rankClass = 'silver';
              else if (rank === 3) rankClass = 'bronze';

              return `
                <div class="leaderboard-item">
                  <div class="rank ${rankClass}">${rank}</div>
                  <div class="player-info">
                    <div class="player-name">${escapeHtml(names[index] || item.id)}</div>
                    <div class="player-details">${item.history ? item.history.length + ' games' : 'Player'}</div>
                  </div>
                  <div class="player-score">${(item.total || 0).toLocaleString()}</div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      });
    }

    function showError(message) {
      const container = document.getElementById('leaderboard-content');
      container.innerHTML = `
        <div class="empty-state">
          <h3>Error</h3>
          <p>${message}</p>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>\"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        
        // Show/hide streamer selector
        const selector = document.getElementById('streamer-selector');
        if (currentTab === 'room') {
          selector.style.display = 'block';
          loadStreamers();
        } else {
          selector.style.display = 'none';
        }
        
        renderLeaderboard(currentTab);
      });
    });

    // Load streamers for dropdown
    async function loadStreamers() {
      try {
        const res = await fetch('/streamers');
        if (!res.ok) {
          console.error('Failed to load streamers');
          return;
        }
        const streamers = await res.json();
        const dropdown = document.getElementById('streamer-dropdown');
        dropdown.innerHTML = '<option value="">-- Choose a streamer --</option>';
        
        streamers.forEach(streamer => {
          const option = document.createElement('option');
          option.value = streamer.email;
          option.textContent = `${streamer.platform}: ${streamer.handle}`;
          dropdown.appendChild(option);
        });
      } catch (error) {
        console.error('Failed to load streamers', error);
      }
    }

    // Load scores for selected streamer
    document.getElementById('streamer-dropdown').addEventListener('change', async (e) => {
      const streamerId = e.target.value;
      if (!streamerId) {
        renderLeaderboard('room'); // Reset to room scores
        return;
      }
      
      try {
        const res = await fetch('/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ streamerId })
        });
        if (!res.ok) {
          console.error('Failed to load streamer scores');
          return;
        }
        const scores = await res.json();
        renderScores(scores, 'room');
      } catch (error) {
        console.error('Failed to load streamer scores', error);
      }
    });

    // Theme toggle with localStorage persistence
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeToggle(newTheme);
    }

    function updateThemeToggle(theme) {
      const toggle = document.getElementById('theme-toggle');
      if (toggle) {
        toggle.textContent = theme === 'light' ? '🌙' : '☀️';
      }
    }

    // Load saved theme on page load
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeToggle(savedTheme);
    })();

    // Initialize
    loadScores();
  </script>

<footer style="text-align:center;padding:40px 20px 60px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:40px;">
  <p style="margin:0 0 8px 0;">© 2026 HangStream — Built for streamers, by streamers</p>
  <div style="display:flex;gap:16px;justify-content:center;align-items:center;">
    <a href="/privacy" style="color:var(--text-muted);text-decoration:none;">Privacy</a>
    <a href="/terms" style="color:var(--text-muted);text-decoration:none;">Terms</a>
    <a href="https://github.com/hangstream/hangstream" target="_blank" rel="noopener" style="color:var(--text-muted);text-decoration:none;">GitHub</a>
    <a href="#" onclick="openDonationModal();return false;" style="color:var(--text-muted);text-decoration:none;">❤ Donate</a>
  </div>
</footer>

<!-- Donation Modal -->
<div id="donation-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:var(--panel);padding:32px;border-radius:24px;max-width:400px;width:90%;border:1px solid var(--border);">
    <h2 style="margin:0 0 16px 0;font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);">❤ Support HangStream</h2>
    <p style="margin:0 0 20px 0;color:var(--text-muted);">Enter the amount you'd like to donate (minimum $1 USD)</p>
    
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
      <button class="donation-amount-btn" data-amount="5" style="padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;transition:all 0.2s;">$5</button>
      <button class="donation-amount-btn" data-amount="10" style="padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;transition:all 0.2s;">$10</button>
      <button class="donation-amount-btn" data-amount="20" style="padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;transition:all 0.2s;">$20</button>
      <button class="donation-amount-btn" data-amount="50" style="padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;transition:all 0.2s;">$50</button>
      <button class="donation-amount-btn" data-amount="100" style="padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;transition:all 0.2s;">$100</button>
      <button class="donation-amount-btn" data-amount="custom" style="padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;transition:all 0.2s;">Custom</button>
    </div>
    
    <input type="number" id="donation-amount-input" placeholder="Custom amount" min="1" step="1" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg-elevated);color:var(--text);margin-bottom:16px;">
    
    <div style="display:flex;gap:12px;">
      <button id="cancel-donation" style="flex:1;padding:12px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);cursor:pointer;font-weight:600;">Cancel</button>
      <button id="confirm-donation" style="flex:1;padding:12px;border-radius:12px;background:var(--accent);border:none;color:white;cursor:pointer;font-weight:600;">Donate</button>
    </div>
  </div>
</div>

<script>
let selectedAmount = 5;

function openDonationModal() {
  const modal = document.getElementById('donation-modal');
  modal.style.display = 'flex';
  document.getElementById('donation-amount-input').value = selectedAmount;
}

function closeDonationModal() {
  const modal = document.getElementById('donation-modal');
  modal.style.display = 'none';
}

document.getElementById('cancel-donation').addEventListener('click', closeDonationModal);

document.querySelectorAll('.donation-amount-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const amount = e.target.dataset.amount;
    if (amount === 'custom') {
      document.getElementById('donation-amount-input').focus();
    } else {
      selectedAmount = parseInt(amount);
      document.getElementById('donation-amount-input').value = selectedAmount;
    }
  });
});

document.getElementById('donation-amount-input').addEventListener('input', (e) => {
  selectedAmount = parseFloat(e.target.value) || 0;
});

document.getElementById('confirm-donation').addEventListener('click', async () => {
  const amount = selectedAmount;
  if (amount < 1) {
    alert('Please enter at least $1');
    return;
  }
  
  const cookies = parseCookies(document.cookie);
  const viewerId = cookies.viewer_id || null;
  const viewerName = 'Leaderboard Visitor';
  
  try {
    const configRes = await fetch('/donate/config');
    const config = await configRes.json();
    
    if (!config.publishableKey) {
      alert('Donations are not currently available. Please check back later.');
      return;
    }
    
    const res = await fetch('/donate/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount,
        viewerId,
        viewerName
      })
    });
    
    const data = await res.json();
    
    if (data.error) {
      alert('Error: ' + data.error);
      return;
    }
    
    window.location.href = data.url;
    closeDonationModal();
  } catch (error) {
    console.error('Donation error:', error);
    alert('Failed to create donation. Please try again.');
  }
});

function parseCookies(cookieHeader) {
  return (cookieHeader || '').split(';').map(s => s.trim()).reduce((acc, cur) => {
    const [k, v] = cur.split('='); if (k) acc[k] = v; return acc;
  }, {});
}
</script>

</body>
</html>
