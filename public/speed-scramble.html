<style id="inline-shared">
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {

  .game-main {

    border-radius: 28px;
    background: color-mix(in srgb, var(--bg-elevated) 88%, transparent);
    backdrop-filter: blur(16px);
    box-shadow: 0 18px 44px rgba(0, 0, 0, 0.14);
    min-width: 0;
  }

  .timer-ring {
    position: relative;
    width: 120px;
    height: 120px;
    margin: 0 auto 24px;
  }

  .timer-ring svg { transform: rotate(-90deg); }

  .timer-circle-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .timer-circle {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;

    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.1s linear;

  .timer-number {

  .scrambled-word {

  .word-input-container {

  .setting-input {
    background: var(--bg);

    border-radius: 12px;

<script>
// ── STATE VARS ──
let config = {
  difficulty: 'normal',
};

let state = {
  viewerId: '',
  viewerName: '',
  viewerAvatar: '',
  streamerId: getStreamerNamespace(),
  gameMode: 'solo',
  gameId: 'speed-scramble',
};

let currentTheme = 'dark';
let playerScores = {};
let currentWord = '';
let scrambledWord = '';
let totalScore = 0;
let streak = 0;
let timerInterval = null;
let timeLeft = 10;
let gameActive = false;
let chatWS = null;
let playerSessionId = null;

const FAKE_USERS = ["xX_gamer99_Xx","streamer_fan","tiktok_live","chat_legend","just_vibing","pro_viewer","randomdude42","hyped_up_lol","lurker_no_more","gifted_sub","nochill_andy","pogchamp99"];

// Difficulty settings
const DIFFICULTY_SETTINGS = {
  easy: {
    wordLength: { min: 4, max: 5 },
    timer: 10,
    points: { first: 75, correct: 20, streak: 5 },
    wordPool: 'very common',
    scramble: 'simple'
  },
  normal: {
    wordLength: { min: 5, max: 7 },
    timer: 8,
    points: { first: 100, correct: 25, streak: 10 },
    wordPool: 'common',
    scramble: 'standard'
  },
  medium: {
    wordLength: { min: 7, max: 9 },
    timer: 7,
    points: { first: 150, correct: 35, streak: 15 },
    wordPool: 'themed',
    scramble: 'strong'
  },
  hard: {
    wordLength: { min: 9, max: 12 },
    timer: 5,
    points: { first: 250, correct: 50, streak: 25 },
    wordPool: 'rare',
    scramble: 'double'
  }
};

// Word pools for different difficulties
const WORD_POOLS = {
  'very common': ['GAME', 'PLAY', 'WORD', 'TIME', 'FAST', 'TEST', 'RUN', 'JUMP', 'WALK', 'TALK'],
  'common': ['ACTION', 'BRAVE', 'DREAM', 'EARTH', 'FLAME', 'GREAT', 'HOUSE', 'IMAGE', 'JUMP', 'KNOW', 'LIGHT', 'MUSIC', 'NIGHT', 'OCEAN'],
  'themed': ['FANTASY', 'JOURNEY', 'MYSTERY', 'ADVENTURE', 'TREASURE', 'KINGDOM', 'WARRIOR', 'MAGICIAN', 'DRAGON', 'CASTLE', 'QUEST'],
  'rare': ['EXTRAORDINARY', 'PHENOMENON', 'ARCHITECTURE', 'BREATHTAKING', 'CHALLENGING', 'EXPERIENCE', 'FANTASTIC']
};

// ── UTILITY ──
function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function getCookieValue(name) {
  const escaped = String(name || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const match = String(document.cookie || '').match(new RegExp('(?:^|; )' + escaped + '=([^;]*)'));
  return match ? decodeURIComponent(match[1]) : '';
}

function getStreamerNamespace() {
  try {
    const cookieOwner = getCookieValue('owner');
    if (cookieOwner) return cookieOwner;
  } catch (e) {}
  try {
    const storedOwner = localStorage.getItem('hangstream-streamer-id') || '';
    if (storedOwner) return storedOwner;
  } catch (e) {}
  return 'default';
}

function getGameMode() {
  const path = window.location.pathname;
  if (path.includes('/online')) return 'online';
  if (path.includes('/solo')) return 'solo';
  return 'solo';
}

function registerPlayer() {
  if (state.gameMode !== 'online') return;
  
  playerSessionId = Date.now().toString(36) + Math.random().toString(36).substr(2);
  
  fetch(`/game-join/${state.gameId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: playerSessionId })
  }).catch(() => {});
}

function unregisterPlayer() {
  if (state.gameMode !== 'online' || !playerSessionId) return;
  
  fetch(`/game-leave/${state.gameId}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sessionId: playerSessionId })
  }).catch(() => {});
  
  playerSessionId = null;
}

function getThemeStorageKey() {
  return `hangstream-game-theme:${getStreamerNamespace()}`;
}

function getSettingsStorageKey() {
  return `hangstream-settings:${getStreamerNamespace()}`;
}

function saveSettings() {
  try {
    localStorage.setItem(getSettingsStorageKey(), JSON.stringify(config));
  } catch (e) {}
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(getSettingsStorageKey());
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved && typeof saved === 'object') {
        config = { ...config, ...saved };
      }
    }
  } catch (e) {}
}

// ── THEME ──
function applyTheme(themeName) {
  currentTheme = themeName || 'dark';
  document.body.setAttribute('data-theme', currentTheme);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = currentTheme === 'light' ? 'Light mode' : 'Dark mode';
  try { localStorage.setItem(getThemeStorageKey(), currentTheme); } catch (e) {}
}

function toggleTheme() {
  applyTheme(currentTheme === 'light' ? 'dark' : 'light');
}

// ── GAME LOGIC ──
function fisherYatesShuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function scrambleWord(word, type) {
  let letters = word.split('');
  
  if (type === 'simple') {
    // Just shuffle once
    letters = fisherYatesShuffle(letters);
  } else if (type === 'standard') {
    // Shuffle twice
    letters = fisherYatesShuffle(fisherYatesShuffle(letters));
  } else if (type === 'strong') {
    // Shuffle three times
    letters = fisherYatesShuffle(fisherYatesShuffle(fisherYatesShuffle(letters)));
  } else if (type === 'double') {
    // Shuffle until no letters are in original position
    let attempts = 0;
    const original = [...letters];
    do {
      letters = fisherYatesShuffle([...letters]);
      attempts++;
    } while (attempts < 10 && letters.some((l, i) => l === original[i]));
  }
  
  return letters.join('');
}

function selectWord(difficulty) {
  const settings = DIFFICULTY_SETTINGS[difficulty] || DIFFICULTY_SETTINGS.normal;
  const wordPool = WORD_POOLS[settings.wordPool] || WORD_POOLS.common;
  
  // Filter words by length
  const validWords = wordPool.filter(word => {
    const len = word.length;
    return len >= settings.wordLength.min && len <= settings.wordLength.max;
  });
  
  if (validWords.length === 0) {
    // Fallback to default word
    return 'GAME';
  }
  
  return validWords[Math.floor(Math.random() * validWords.length)];
}

function newGame() {
  // Stop current timer
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  // Select word based on difficulty
  currentWord = selectWord(config.difficulty);
  const settings = DIFFICULTY_SETTINGS[config.difficulty] || DIFFICULTY_SETTINGS.normal;
  
  // Scramble the word
  scrambledWord = scrambleWord(currentWord, settings.scramble);
  
  // Reset timer
  timeLeft = settings.timer;
  gameActive = true;
  
  renderWord();
  updateStreamerHint();
  updateTimerDisplay();
  startTimer();
  clearMessage();
  
  // Clear input
  const input = document.getElementById('word-input');
  if (input) {
    input.value = '';
    input.focus();
  }
}

function toggleStreamerHint() {
  const answer = document.getElementById('streamer-answer');
  const btn = document.getElementById('streamer-hint-btn');
  if (!answer || !btn) return;

  if (answer.style.display === 'none') {
    answer.style.display = '';
    btn.textContent = '🙈 Hide Answer';
  } else {
    answer.style.display = 'none';
    btn.textContent = '👁️ Show Answer';
  }
}

function updateStreamerHint() {
  const answer = document.getElementById('streamer-answer');
  if (answer) {
    answer.textContent = currentWord;
  }
}

function initStreamerHint() {
  const hintBtn = document.getElementById('streamer-hint-btn');
  if (!hintBtn) return;

  // Check if user is the streamer (has owner cookie matching namespace)
  const streamerNamespace = getStreamerNamespace();
  const owner = getCookieValue('owner');
  if (owner && owner === streamerNamespace) {
    hintBtn.style.display = '';
  }
}

function renderWord() {
  const wordEl = document.getElementById('scrambled-word');
  if (wordEl) {
    wordEl.textContent = scrambledWord;
    wordEl.classList.remove('revealing');
  }
}

function revealWord() {
  const wordEl = document.getElementById('scrambled-word');
  if (wordEl) {
    wordEl.textContent = currentWord;
    wordEl.classList.add('revealing');
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    
    if (timeLeft <= 0) {
      endRound(false);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const timerNumber = document.getElementById('timer-number');
  const timerCircle = document.getElementById('timer-circle');
  
  if (timerNumber) {
    timerNumber.textContent = timeLeft;
  }
  
  if (timerCircle) {
    const circumference = 2 * Math.PI * 54;
    const offset = circumference * (1 - timeLeft / 10); // Assuming max 10 seconds
    timerCircle.style.strokeDashoffset = offset;
  }
}

function submitAnswer() {
  if (!gameActive) {
    newGame();
    return;
  }
  
  const input = document.getElementById('word-input');
  if (!input) return;
  
  const answer = input.value.toUpperCase().trim();
  
  if (!answer) return;
  
  if (answer === currentWord) {
    correctAnswer();
  } else {
    wrongAnswer();
  }
  
  input.value = '';
}

function correctAnswer() {
  gameActive = false;
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  const settings = DIFFICULTY_SETTINGS[config.difficulty] || DIFFICULTY_SETTINGS.normal;
  const points = streak > 0 ? settings.points.correct + settings.points.streak : settings.points.first;
  
  streak++;
  totalScore += points;
  
  revealWord();
  updateStreak();
  updateScore();
  showMessage(`Correct! +${points} points!`, 'success');
  
  if (state.viewerName) {
    awardPlayerPoints(state.viewerName, points, currentWord);
  }
  
  addChatMessage(state.viewerName || 'Player', currentWord, 'correct');
  
  // Auto-start next round after delay
  setTimeout(newGame, 3000);
}

function wrongAnswer() {
  streak = 0;
  updateStreak();
  showMessage('Wrong! Try again', 'error');
  
  addChatMessage(state.viewerName || 'Player', 'Wrong guess', 'wrong');
}

function endRound(success) {
  gameActive = false;
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  
  revealWord();
  
  if (!success) {
    streak = 0;
    updateStreak();
    showMessage(`Time's up! The word was ${currentWord}`, 'error');
  }
  
  // Auto-start next round
  setTimeout(newGame, 3000);
}

function updateScore() {
  const scoreDisplay = document.querySelector('.streak-display');
  if (scoreDisplay) {
    scoreDisplay.innerHTML = `Score: <span class="streak-number" id="total-score">${totalScore}</span> Streak: <span class="streak-number" id="streak">${streak}</span>`;
  }
}

function updateStreak() {
  const streakEl = document.getElementById('streak');
  if (streakEl) {
    streakEl.textContent = streak;
  }
}

// ── CHAT INTEGRATION ──
function connectChatWebSocket() {
  if (chatWS) return;
  
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}`;
  
  try {
    chatWS = new WebSocket(wsUrl);
    
    chatWS.addEventListener('open', () => {
      console.log('Chat WebSocket connected');
      if (state.streamerId && state.streamerId !== 'default') {
        chatWS.send(JSON.stringify({
          type: 'watch',
          platform: 'both',
          owner: state.streamerId,
          twitchChannel: state.streamerId,
          tiktokChannel: state.streamerId
        }));
      }
    });
    
    chatWS.addEventListener('message', (event) => {
      try {
        const data = JSON.parse(event.data);
        handleChatMessage(data);
      } catch (e) {
        console.error('Failed to parse chat message:', e);
      }
    });
    
    chatWS.addEventListener('close', () => {
      console.log('Chat WebSocket disconnected, reconnecting in 5s...');
      setTimeout(connectChatWebSocket, 5000);
    });
    
    chatWS.addEventListener('error', () => {
      console.warn('Chat WebSocket error');
    });
  } catch (e) {
    console.error('Failed to create WebSocket connection:', e);
  }
}

function handleChatMessage(data) {
  const twitchDot = document.getElementById('twitch-dot');
  const twitchLabel = document.getElementById('twitch-label');
  if (twitchDot && twitchLabel) {
    if (data.type === 'chat' || data.type === 'status') {
      twitchDot.classList.add('connected');
      twitchLabel.textContent = 'CONNECTED';
    }
  }
  
  if (data.type === 'chat') {
    const user = data.user || 'viewer';
    const message = (data.message || '').trim().toUpperCase();
    
    addChatMessage(user, message, 'normal');
    
    // Process as a potential answer
    if (message && /^[A-Z]+$/.test(message)) {
      processChatAnswer(user, message);
    }
  }
}

function processChatAnswer(user, answer) {
  if (!gameActive || !answer) return;
  
  if (answer === currentWord) {
    correctAnswer();
  } else {
    addChatMessage(user, `Guessed: ${answer}`, 'wrong');
  }
}

// ── CHAT FEED ──
function addChatMessage(user, message, type = 'normal') {
  const feed = document.getElementById('chat-feed');
  if (!feed) return;
  
  const msg = document.createElement('div');
  msg.className = 'chat-msg';
  
  if (type === 'correct') {
    msg.innerHTML = `<span class="chat-user">${escapeHtml(user)}</span> found <span class="chat-correct">${escapeHtml(message)}</span>`;
  } else if (type === 'wrong') {
    msg.innerHTML = `<span class="chat-user">${escapeHtml(user)}</span> tried <span class="chat-wrong">${escapeHtml(message)}</span>`;
  } else {
    msg.innerHTML = `<span class="chat-user">${escapeHtml(user)}</span>: <span class="chat-guess">${escapeHtml(message)}</span>`;
  }
  
  feed.appendChild(msg);
  feed.scrollTop = feed.scrollHeight;
}

// ── PLAYER SCORES ──
function renderPlayerScores() {
  const list = document.getElementById('player-scores-list');
  if (!list) return;
  const entries = Object.entries(playerScores)
    .filter(([, points]) => Number(points) > 0)
    .sort((a, b) => Number(b[1]) - Number(a[1]) || a[0].localeCompare(b[0]));
  if (!entries.length) {
    list.innerHTML = '<div class="player-score-row"><span class="player-score-name">No points yet.</span><span class="player-score-points">0</span></div>';
    return;
  }
  list.innerHTML = entries.map(([name, points]) => {
    return `<div class="player-score-row"><span class="player-score-name">${escapeHtml(name)}</span><span class="player-score-points">${points}</span></div>`;
  }).join('');
}

function awardPlayerPoints(username, points, note) {
  const name = String(username || '').trim() || 'viewer';
  const current = Number(playerScores[name]) || 0;
  playerScores[name] = current + Math.max(0, Number(points) || 0);
  renderPlayerScores();
}

// ── MESSAGES ──
function showMessage(text, type) {
  const area = document.getElementById('message-area');
  if (!area) return;
  
  area.innerHTML = `<div class="message-box ${type}">${text}</div>`;
  
  setTimeout(() => {
    area.innerHTML = '';
  }, 3000);
}

function clearMessage() {
  const area = document.getElementById('message-area');
  if (area) area.innerHTML = '';
}

// ── EVENT LISTENERS ──
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('theme-btn')
    .addEventListener('click', toggleTheme);

  document.getElementById('new-game-btn')
    .addEventListener('click', newGame);

  document.getElementById('submit-btn')
    .addEventListener('click', submitAnswer);

  const difficultySelect = document.getElementById('difficulty-select');
  if (difficultySelect) {
    difficultySelect.value = config.difficulty || 'normal';
    difficultySelect.addEventListener('change', (e) => {
      config.difficulty = e.target.value || 'normal';
      saveSettings();
      newGame();
    });
  }

  const wordInput = document.getElementById('word-input');
  if (wordInput) {
    wordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitAnswer();
    });
  }
});

// ── INIT ──
loadSettings();
state.gameMode = getGameMode();
applyTheme(localStorage.getItem(getThemeStorageKey()) || 'dark');

// Detect overlay mode and add body class
if (window.location.pathname.startsWith('/overlay')) {
  document.body.classList.add('overlay-mode');
}

newGame();

// Initialize streamer hint (only show if user is streamer)
setTimeout(initStreamerHint, 500);

if (state.gameMode === 'online') {
  registerPlayer();
}

connectChatWebSocket();

window.addEventListener('beforeunload', () => {
  unregisterPlayer();
  if (chatWS) {
    chatWS.close();
    chatWS = null;
  }
  if (timerInterval) {
    clearInterval(timerInterval);
  }
});

window.addEventListener('storage', (event) => {
  if (event.key === getSettingsStorageKey()) loadSettings();
  if (event.key === getThemeStorageKey()) applyTheme(event.newValue || 'dark');
});
</script>
